<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Platform — Practice Quizzes</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <h1>Study Platform</h1>
    <p>Structured practice across mathematics, science, English, and digital literacy</p>
  </header>

  <main class="container">
    <section id="subjects-section">
      <h2>Select a subject</h2>
      <div id="subjects-list" class="subjects-grid">
        <p class="loading">Loading subjects...</p>
      </div>
    </section>

    <section id="quiz-section" class="hidden">
      <button id="back-btn" class="btn-secondary">← Back to subjects</button>
      <h2 id="quiz-title">Assessment</h2>
      <div id="quiz-container"></div>
      <p id="quiz-score" class="score hidden"></p>
    </section>
  </main>

  <footer class="footer">
    <small>Jenkins CI/CD · GitHub Actions · Docker · Health: <span id="health-status">checking...</span></small>
    <!-- auto-deploy-test 2026-05-21 -->
  </footer>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
