# =============================================================================
# GitHub Actions CI/CD Pipeline - Kids Study App
#
# Stages (in order):
#   1. Install dependencies
#   2. Run lint checks
#   3. Run unit tests
#   4. Build Docker images
#   5. Push Docker images to local registry
#   6. Deploy using Docker Compose
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  LOCAL_REGISTRY: localhost:5000
  BACKEND_IMAGE: kids-study-backend
  FRONTEND_IMAGE: kids-study-frontend

jobs:
  # ---------------------------------------------------------------------------
  # Job 1-3: Install, Lint, Test (runs on every push/PR)
  # ---------------------------------------------------------------------------
  quality:
    name: Install · Lint · Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      # Stage 1: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Stage 2: Lint checks
      - name: Run lint checks
        run: npm run lint

      # Stage 3: Unit tests
      - name: Run unit tests
        run: npm test

  # ---------------------------------------------------------------------------
  # Jobs 4-6: Build, push to local registry, deploy (main branch only)
  # ---------------------------------------------------------------------------
  build-and-deploy:
    name: Build · Push · Deploy
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Start local registry for stage 5 (push images locally)
      - name: Start local Docker registry
        run: |
          docker run -d -p 5000:5000 --restart unless-stopped --name ci-registry registry:2
          sleep 3

      # Stage 4: Build Docker images
      - name: Build backend Docker image
        run: |
          docker build -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} ./backend
          docker tag ${{ env.BACKEND_IMAGE }}:${{ github.sha }} ${{ env.BACKEND_IMAGE }}:latest

      - name: Build frontend Docker image
        run: |
          docker build -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ./frontend
          docker tag ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ${{ env.FRONTEND_IMAGE }}:latest

      # Stage 5: Push Docker images to local registry
      - name: Tag and push images to local registry
        run: |
          docker tag ${{ env.BACKEND_IMAGE }}:latest ${{ env.LOCAL_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          docker tag ${{ env.FRONTEND_IMAGE }}:latest ${{ env.LOCAL_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
          docker push ${{ env.LOCAL_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          docker push ${{ env.LOCAL_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
          echo "Images pushed to ${{ env.LOCAL_REGISTRY }}"

      # Stage 6: Deploy with Docker Compose
      - name: Create environment file for deploy
        run: |
          cp .env.example .env
          echo "BACKEND_IMAGE=${{ env.LOCAL_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest" >> .env
          echo "FRONTEND_IMAGE=${{ env.LOCAL_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest" >> .env
          echo "API_URL=http://localhost:3000" >> .env

      - name: Deploy with Docker Compose
        run: |
          docker pull ${{ env.LOCAL_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          docker pull ${{ env.LOCAL_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
          docker compose up -d --no-build
          sleep 20

      - name: Smoke test deployment
        run: |
          curl -f http://localhost:3000/health
          curl -f http://localhost:8080/
          echo "Deployment smoke tests passed!"

      - name: Show running containers
        if: always()
        run: docker compose ps
