# CI on GitHub (lint, test, Docker build).
# Local auto-deploy uses Jenkins (Jenkinsfile) on your Ubuntu machine — not GitHub cloud.

name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  ci:
    name: Install · Lint · Test · Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run lint checks
        working-directory: backend
        run: npm run lint

      - name: Run unit tests
        working-directory: backend
        run: npm test

      - name: Build backend Docker image
        run: docker build -t kids-study-backend:ci ./backend

      - name: Build frontend Docker image
        run: docker build -t kids-study-frontend:ci ./frontend
