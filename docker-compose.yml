# =============================================================================
# Docker Compose - full stack for Kids Study App
# Services: postgres, backend, frontend, prometheus, grafana, local registry
# Usage: cp .env.example .env && docker-compose up -d --build
#        (or: ./scripts/compose.sh up -d --build)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL - persistent data store for subjects and quiz questions
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: kids-study-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kidsapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kidsapp_secret}
      POSTGRES_DB: ${POSTGRES_DB:-kids_study}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-kidsapp} -d ${POSTGRES_DB:-kids_study}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kids-network

  # ---------------------------------------------------------------------------
  # Backend - Node.js Express API
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-kids-study-backend:latest}
    container_name: kids-study-backend
    restart: unless-stopped
    ports:
      - '${BACKEND_PORT:-3002}:3000'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kidsapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kidsapp_secret}
      POSTGRES_DB: ${POSTGRES_DB:-kids_study}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      BACKEND_PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - kids-network

  # ---------------------------------------------------------------------------
  # Frontend - Nginx serving HTML/CSS/JS
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${FRONTEND_IMAGE:-kids-study-frontend:latest}
    container_name: kids-study-frontend
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      API_URL: ${API_URL:-http://localhost:3000}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - kids-network

  # ---------------------------------------------------------------------------
  # Prometheus - collects metrics from backend /metrics
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: kids-study-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - backend
    networks:
      - kids-network

  # ---------------------------------------------------------------------------
  # Grafana - dashboards for visualizing Prometheus data
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.2.0
    container_name: kids-study-grafana
    restart: unless-stopped
    ports:
      - '${GRAFANA_PORT:-3030}:3000'
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - kids-network

  # ---------------------------------------------------------------------------
  # Local Docker Registry - CI pushes images here (stage 5)
  # On Ubuntu: docker compose up registry -d before running CI deploy locally
  # ---------------------------------------------------------------------------
  registry:
    image: registry:2
    container_name: kids-study-registry
    restart: unless-stopped
    ports:
      - '5000:5000'
    volumes:
      - registry_data:/var/lib/registry
    networks:
      - kids-network

networks:
  kids-network:
    driver: bridge

volumes:
  postgres_data:
  registry_data:
